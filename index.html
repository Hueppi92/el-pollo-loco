<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <script src="js/game.js"></script>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/statusbar-object.class.js"></script>
    <script src="models/statusbar-coin.class.js"></script>
    <script src="models/statusbar-bottle.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="models/bottle-box.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    
    <title>El Pollo Loco</title>
</head>
<body>
    <h1>El pollo loco</h1>
    <div id="gameContainer">
            <canvas id="canvas" width="720" height="480"></canvas>
            <div id="gameButtons">
                <button id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
                <button id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
            </div>
            <div id="startScreenOverlay">
                    <img id="startScreenImg" src="img/9_intro_outro_screens/start/startscreen_1.png" alt="Start Screen">
                    <button id="startGameBtn" onclick="startGame()">Start Game</button>
            </div>
            <div id="endScreenOverlay">
                    <img id="endScreenImg" src="" alt="End Screen">
                    <button id="restartBtn" onclick="location.reload()">Play Again</button>
            </div>
            <div id="mobileControls">
                <div id="mobileLeft">
                    <button id="btnLeft">←</button>
                    <button id="btnRight">→</button>
                </div>
                <div id="mobileRight">
                    <button id="btnJump">↑ Jump</button>
                    <button id="btnThrow">🍾 Throw</button>
                </div>
            </div>
        </div>
</body>
</html>
